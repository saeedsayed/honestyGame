<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chooser</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="option-one">
            <button><i class="fa fa-caret-down" aria-hidden="true"></i></button>
            <ul class="">
                <h3>عدد الفائزين</h3>
                <li>1</li>
                <li class="active">2</li>
                <li>3</li>
                <li>4</li>
                <li>5</li>
            </ul>
        </div>
        <div class="logo">CHOOSER</div>
        <div class="option-tow">
            <button><i class="fa fa-bars" aria-hidden="true"></i></button>
            <ul class="">
                <li>انتقاء <i class="fa-solid fa-user"></i></li>
                <li class="active">مجموعة <i class="fa-solid fa-user-group"></i></li>
                <li>تقييم <i class="fa-solid fa-ranking-star"></i></li>
                <li>نسبة <i class="fa-solid fa-percent"></i></li>
                <li>العجلة <i class="fa-solid fa-dharmachakra"></i></li>
            </ul>
        </div>
    </header>
    <div class="body">
        
    </div>
    <script src="js/app.js"></script>
</body>

</html>
