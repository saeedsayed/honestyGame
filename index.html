<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chooser</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="add-player">
            <button id="openForm">اضافة لاعبين</button>
            <div class="add-player__form">
                <div class="add-player__form--inputs">
                    <input type="text">
                    <input type="text">
                </div>
                <button id="addInputToForm">+</button>
                <button id="addPlayerBtn">اضافة الاسماء</button>
                <button id="closeForm">الغاء</button>
            </div>
        </div>
        <div class="logo">CHOOSER</div>
        <div class="option-tow">
            <button><i class="fa fa-bars" aria-hidden="true"></i></button>
            <ul class="">
                <li>انتقاء <i class="fa-solid fa-user"></i></li>
                <li class="active">مجموعة <i class="fa-solid fa-user-group"></i></li>
                <li>تقييم <i class="fa-solid fa-ranking-star"></i></li>
                <li>نسبة <i class="fa-solid fa-percent"></i></li>
                <li>العجلة <i class="fa-solid fa-dharmachakra"></i></li>
            </ul>
        </div>
    </header>
    <div class="body">
        <div class="loser">
            <h2>الخاسر</h2>
            <p class="lose-name">احمد</p>
        </div>
        <div class="winner">
            <h2>الفائز</h2>
            <p class="win-name">سعيد</p>
        </div>
        <button class="btn-play">ابداء</button>
    </div>
    <script src="js/app.js"></script>
</body>

</html>
